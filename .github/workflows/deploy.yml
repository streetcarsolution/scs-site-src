name: Deploy to OVH via SFTP

on:
  push:
    branches: [ main ]   # si ta branche par défaut est "master", remplace ici
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ssh.cluster100.hosting.ovh.net
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          protocol: sftp
          port: 22
          server-dir: /www/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
          log-level: standard
